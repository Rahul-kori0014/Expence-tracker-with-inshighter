{% extends "base.html" %}
{% block header %}Delete Expense{% endblock %}
{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <h3 style="color: var(--danger); margin-bottom: 20px;">Confirm Deletion</h3>
    <p>Are you sure you want to delete the expense of <strong style="color: #fff;">${{ expense.amount|floatformat:2 }}</strong> for <strong style="color: #fff;">{{ expense.category.name }}</strong>?</p>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; margin-top: 10px;">This action cannot be undone.</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button type="submit" class="btn btn-danger glow">Yes, Delete</button>
            <a href="{% url 'expense_list' %}" class="btn" style="background: rgba(255,255,255,0.1); color: var(--text-color);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
